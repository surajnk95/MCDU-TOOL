<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>777-9 MCDU Grid Tool</title>
    <link rel="stylesheet" href="/styles.css?v=focused-grid-pass" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>777-9 MCDU Grid Tool</h1>
        <p>Align the screen, tune the 13 x 40 grid, OCR the cells, then export a Word reference table.</p>
      </div>
      <div class="status" id="status">Ready</div>
    </header>

    <main class="workspace">
      <section class="panel capture-panel">
        <div class="panel-head">
          <h2>Image and Grid</h2>
          <label class="upload-button">
            <input id="fileInput" type="file" accept="image/*" />
            Choose Image
          </label>
        </div>

        <div class="canvas-shell">
          <canvas id="imageCanvas" width="1200" height="780"></canvas>
          <div class="empty-state" id="emptyState">Load a phone photo of the MCDU screen to begin.</div>
        </div>

        <div class="controls">
          <label>
            Left inset
            <input id="leftInset" type="range" min="0" max="18" step="0.25" value="0" />
          </label>
          <label>
            Right inset
            <input id="rightInset" type="range" min="0" max="18" step="0.25" value="0" />
          </label>
          <label>
            Top inset
            <input id="topInset" type="range" min="0" max="18" step="0.25" value="0" />
          </label>
          <label>
            Bottom inset
            <input id="bottomInset" type="range" min="0" max="18" step="0.25" value="0" />
          </label>
        </div>

        <div class="actions">
          <button id="resetCorners" type="button">Reset Corners</button>
          <button id="detectButton" type="button" disabled>Auto Detect Display</button>
          <button id="photoViewButton" type="button" disabled>Photo View</button>
          <button id="flatViewButton" type="button" disabled>Flattened View</button>
          <button id="analyzeButton" class="primary" type="button" disabled>Analyze Grid</button>
          <button id="exportButton" type="button" disabled>Export Word File</button>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="panel-head">
          <h2>Extracted Grid</h2>
          <button id="rememberButton" type="button" disabled>Remember Corrections</button>
        </div>
        <div class="verification-panel">
          <label class="toggle-label">
            <input id="wholeGridVerify" type="checkbox" />
            Whole-grid focused recheck during analysis
          </label>
          <label>
            Recheck behavior
            <select id="verificationMode">
              <option value="conservative">Fill missed cells only</option>
              <option value="balanced">Fill blanks and trusted dashes</option>
              <option value="aggressive">Replace with focused reading</option>
            </select>
          </label>
          <button id="refineGridButton" type="button" disabled>Focused Recheck</button>
          <div id="verificationSummary" class="verification-summary" hidden></div>
        </div>
        <div class="requirement-builder">
          <label>
            Row
            <input id="requirementRow" type="number" min="1" max="13" value="1" />
          </label>
          <label>
            Start column
            <input id="requirementStart" type="number" min="1" max="38" value="1" />
          </label>
          <label>
            End column
            <input id="requirementEnd" type="number" min="1" max="38" value="1" />
          </label>
          <label>
            Check
            <select id="requirementType">
              <option value="exact">Exact text</option>
              <option value="contains">Contains text</option>
              <option value="fill">Fill range with character</option>
              <option value="blank">Range must be blank</option>
              <option value="not_contains">Must not contain text</option>
            </select>
          </label>
          <label class="requirement-text-field">
            Expected text
            <input id="requirementText" type="text" autocomplete="off" />
          </label>
          <label class="toggle-label">
            <input id="requirementIgnoreCase" type="checkbox" checked />
            Ignore case
          </label>
          <label class="toggle-label">
            <input id="requirementIgnoreSpaces" type="checkbox" />
            Ignore extra spaces
          </label>
          <button id="addRequirementButton" type="button">Add Requirement</button>
          <button id="reviewRequirementsButton" class="primary" type="button" disabled>Review All</button>
        </div>
        <div id="requirementList" class="requirement-list"></div>
        <div id="requirementsSummary" class="requirements-summary" hidden></div>
        <div id="requirementsResults" class="requirements-results" hidden></div>
        <div class="table-wrap">
          <table id="gridTable" aria-label="MCDU extracted 13 by 40 grid"></table>
        </div>
      </section>
    </main>

    <script src="/app.js?v=focused-grid-pass"></script>
  </body>
</html>
